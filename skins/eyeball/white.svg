<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- White/Outer part of eye -->
  <circle cx="50" cy="50" r="45" fill="#e8f0ff" stroke="#4dabf7" stroke-width="2"/>
  
  <!-- Iris (light blue) -->
  <circle cx="50" cy="50" r="28" fill="#74c0fc" stroke="#4dabf7" stroke-width="1"/>
  
  <!-- Pupil (dark blue) -->
  <circle cx="50" cy="50" r="16" fill="#1971c2" stroke="#0b5394" stroke-width="1"/>
  
  <!-- Shine/highlight -->
  <circle cx="43" cy="42" r="6" fill="#ffffff" opacity="0.8"/>
  <circle cx="46" cy="46" r="2" fill="#ffffff" opacity="0.6"/>
  
  <!-- Subtle eyelids to give it personality -->
  <path d="M 20 50 Q 50 30, 80 50" fill="none" stroke="#bbeaf8" stroke-width="1.5" opacity="0.6"/>
  <path d="M 20 50 Q 50 70, 80 50" fill="none" stroke="#bbeaf8" stroke-width="1.5" opacity="0.6"/>
</svg>